<!DOCTYPE html>
<html>
<head>
  <title>AR Chat Pro 🔥</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js" type="module"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }

    #login { display:flex; height:100vh; justify-content:center; align-items:center; flex-direction:column; }

    input { padding:10px; margin:5px; border-radius:10px; border:none; width:80%; }

    button { padding:10px; border:none; border-radius:10px; background:#22c55e; color:white; }

    #chat { display:none; height:100vh; }

    #users {
      width:30%;
      background:#1e293b;
      overflow:auto;
      padding:10px;
    }

    #users div {
      padding:8px;
      border-bottom:1px solid #333;
      cursor:pointer;
    }

    #users div:hover { background:#334155; }

    #main {
      width:70%;
      display:flex;
      flex-direction:column;
    }

    #messages { flex:1; overflow:auto; padding:10px; }

    .msg {
      background:#334155;
      margin:5px;
      padding:8px;
      border-radius:10px;
    }

    #inputBox { display:flex; padding:10px; gap:5px; }

    #msg { flex:1; }

    #emojiPicker {
      position:absolute;
      bottom:70px;
      right:10px;
      display:none;
    }
  </style>
</head>

<body>

<div id="login">
  <h2>Enter Name 😄</h2>
  <input id="name" placeholder="Your name">
  <button onclick="enterChat()">Enter</button>
</div>

<div id="chat">
  <div id="users"></div>

  <div id="main">
    <h3 id="chatWith">Public Chat 🌍</h3>
    <div id="messages"></div>

    <div id="inputBox">
      <button onclick="toggleEmoji()">😊</button>
      <input id="msg" placeholder="Type message...">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <emoji-picker id="emojiPicker"></emoji-picker>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, set, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDuQJrIYpKFMoTR1YLa5vwpycdwD1Lx30",
  authDomain: "archat-399b4.firebaseapp.com",
  databaseURL: "https://archat-399b4-default-rtdb.firebaseio.com",
  projectId: "archat-399b4",
  storageBucket: "archat-399b4.appspot.com",
  messagingSenderId: "787323919365",
  appId: "1:787323919365:web:0bed2022b55b20e89a106c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = "";
let currentChat = "public";
let msgRef = null;

// ENTER CHAT
window.enterChat = function () {
  username = document.getElementById("name").value;
  if (!username) return alert("Enter name");

  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  set(ref(db, "users/" + username), true);

  loadUsers();
  loadMessages();
};

// LOAD USERS
function loadUsers() {
  onValue(ref(db, "users"), snapshot => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "";

    snapshot.forEach(child => {
      const user = child.key;

      const div = document.createElement("div");
      div.innerText = "🟢 " + user;

      div.onclick = () => {
        currentChat = user;
        document.getElementById("chatWith").innerText = "Chat with " + user;
        document.getElementById("messages").innerHTML = "";
        loadMessages();
      };

      usersDiv.appendChild(div);
    });
  });
}

// LOAD MESSAGES (FIXED)
function loadMessages() {

  if (msgRef) off(msgRef);

  msgRef = ref(db, "messages");

  onValue(msgRef, snapshot => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach(child => {
      const msg = child.val();

      if (
        currentChat === "public" ||
        (msg.to === currentChat && msg.from === username) ||
        (msg.from === currentChat && msg.to === username)
      ) {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerText = msg.from + ": " + msg.text;
        messagesDiv.appendChild(div);
      }
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

// SEND
window.send = function () {
  const text = document.getElementById("msg").value;
  if (!text) return;

  push(ref(db, "messages"), {
    from: username,
    to: currentChat,
    text: text
  });

  document.getElementById("msg").value = "";
};

// EMOJI
const picker = document.getElementById("emojiPicker");

picker.addEventListener("emoji-click", e => {
  document.getElementById("msg").value += e.detail.unicode;
});

window.toggleEmoji = function () {
  const picker = document.getElementById("emojiPicker");
  picker.style.display = picker.style.display === "none" ? "block" : "none";
};
</script>

</body>
</html>
